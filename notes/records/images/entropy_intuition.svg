<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" role="img" aria-labelledby="title desc">
  <title id="title">Entropy intuition</title>
  <desc id="desc">A comparison between a peaked probability distribution with low entropy and a uniform distribution with high entropy.</desc>
  <rect width="760" height="300" fill="#ffffff"/>
  <text x="190" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#222">低熵：结果更容易猜</text>
  <text x="570" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#222">高熵：结果更难预测</text>
  <line x1="70" y1="240" x2="330" y2="240" stroke="#444" stroke-width="2"/>
  <line x1="70" y1="70" x2="70" y2="240" stroke="#444" stroke-width="2"/>
  <rect x="105" y="88" width="45" height="152" fill="#4f7cac"/>
  <rect x="168" y="224" width="45" height="16" fill="#8fc0a9"/>
  <rect x="231" y="224" width="45" height="16" fill="#f2b880"/>
  <text x="127" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">A</text>
  <text x="190" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">B</text>
  <text x="253" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">C</text>
  <text x="190" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#555">P = [0.9, 0.05, 0.05]</text>
  <line x1="450" y1="240" x2="710" y2="240" stroke="#444" stroke-width="2"/>
  <line x1="450" y1="70" x2="450" y2="240" stroke="#444" stroke-width="2"/>
  <rect x="485" y="145" width="45" height="95" fill="#4f7cac"/>
  <rect x="548" y="145" width="45" height="95" fill="#8fc0a9"/>
  <rect x="611" y="145" width="45" height="95" fill="#f2b880"/>
  <text x="507" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">A</text>
  <text x="570" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">B</text>
  <text x="633" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">C</text>
  <text x="570" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#555">P = [1/3, 1/3, 1/3]</text>
  <text x="36" y="82" font-family="Arial, sans-serif" font-size="13" fill="#555">概率</text>
  <text x="416" y="82" font-family="Arial, sans-serif" font-size="13" fill="#555">概率</text>
</svg>
