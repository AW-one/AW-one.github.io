<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">DiT latent diffusion pipeline</title>
  <desc id="desc">A schematic of a DiT pipeline: image is encoded into latent space, noised, patchified, processed by DiT blocks, unpatchified and decoded.</desc>
  <rect width="980" height="360" fill="#ffffff"/>
  <text x="490" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#222">DiT Pipeline: Latent Diffusion + Transformer Denoiser</text>
  <g font-family="Arial, sans-serif" font-size="15">
    <rect x="40" y="132" width="105" height="66" rx="8" fill="#e8f1ff" stroke="#4f7cac" stroke-width="2"/>
    <text x="92" y="158" text-anchor="middle" fill="#222">Image</text>
    <text x="92" y="180" text-anchor="middle" fill="#555">x₀</text>
    <path d="M150 165 H205" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="220" y="122" width="125" height="86" rx="8" fill="#f5f7fa" stroke="#777" stroke-width="2"/>
    <text x="282" y="150" text-anchor="middle" fill="#222">Frozen VAE</text>
    <text x="282" y="173" text-anchor="middle" fill="#555">Encoder E</text>
    <text x="282" y="195" text-anchor="middle" fill="#555">z₀ = E(x₀)</text>
    <path d="M350 165 H405" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="420" y="122" width="120" height="86" rx="8" fill="#fff4e6" stroke="#f2a65a" stroke-width="2"/>
    <text x="480" y="150" text-anchor="middle" fill="#222">Forward</text>
    <text x="480" y="173" text-anchor="middle" fill="#555">add noise</text>
    <text x="480" y="195" text-anchor="middle" fill="#555">zₜ</text>
    <path d="M545 165 H600" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="615" y="82" width="130" height="166" rx="8" fill="#f7f2fb" stroke="#9a6fb0" stroke-width="2"/>
    <text x="680" y="110" text-anchor="middle" fill="#222">Patchify</text>
    <rect x="642" y="130" width="22" height="22" fill="#d9c3e8" stroke="#9a6fb0"/>
    <rect x="666" y="130" width="22" height="22" fill="#d9c3e8" stroke="#9a6fb0"/>
    <rect x="690" y="130" width="22" height="22" fill="#d9c3e8" stroke="#9a6fb0"/>
    <rect x="642" y="154" width="22" height="22" fill="#d9c3e8" stroke="#9a6fb0"/>
    <rect x="666" y="154" width="22" height="22" fill="#d9c3e8" stroke="#9a6fb0"/>
    <rect x="690" y="154" width="22" height="22" fill="#d9c3e8" stroke="#9a6fb0"/>
    <text x="680" y="205" text-anchor="middle" fill="#555">T = (I / p)²</text>
    <path d="M750 165 H805" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="820" y="82" width="120" height="166" rx="8" fill="#eaf8ef" stroke="#58a55c" stroke-width="2"/>
    <text x="880" y="112" text-anchor="middle" fill="#222">DiT Blocks</text>
    <text x="880" y="138" text-anchor="middle" fill="#555">MSA + MLP</text>
    <text x="880" y="162" text-anchor="middle" fill="#555">adaLN-Zero</text>
    <text x="880" y="186" text-anchor="middle" fill="#555">condition: t,c</text>
    <text x="880" y="218" text-anchor="middle" fill="#222">predict ε̂</text>
    <path d="M880 254 C850 315 710 315 670 254" fill="none" stroke="#58a55c" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrowGreen)"/>
    <text x="770" y="323" text-anchor="middle" fill="#555">unpatchify → reverse step → VAE decoder</text>
    <text x="490" y="292" text-anchor="middle" fill="#555">DiT 的 denoiser 处理的是 latent patches，而不是像素级 U-Net feature maps</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#58a55c"/>
    </marker>
  </defs>
</svg>
